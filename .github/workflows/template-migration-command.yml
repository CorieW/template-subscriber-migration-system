name: Template migration command

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read

concurrency:
  group: template-migration-${{ github.event.issue.number }}
  cancel-in-progress: false

env:
  # Set this in the template repo before subscribers are created, for example: octo-org/template-repo
  TEMPLATE_SYNC_DEFAULT_UPSTREAM_REPO: OWNER/TEMPLATE_REPO
  # Change this to pin a version, git URL, or tarball package spec.
  TEMPLATE_SYNC_PACKAGE: template-subscriber-migration-system@latest
  # Supported values: openai, gemini, anthropic.
  TEMPLATE_SYNC_AI_PROVIDER: openai
  TEMPLATE_SYNC_AI_MODEL: gpt-5.5

jobs:
  command:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout subscriber repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.TEMPLATE_SYNC_BOT_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install template sync package
        run: |
          if [ -z "$TEMPLATE_SYNC_PACKAGE" ]; then
            echo "::error::Set TEMPLATE_SYNC_PACKAGE to a published npm package, git URL, or tarball package spec."
            exit 1
          fi
          npm install --global --prefix "$RUNNER_TEMP/template-sync" --ignore-scripts "$TEMPLATE_SYNC_PACKAGE"
          echo "$RUNNER_TEMP/template-sync/bin" >> "$GITHUB_PATH"

      - name: Handle template sync command
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          TEMPLATE_SYNC_BOT_TOKEN: ${{ secrets.TEMPLATE_SYNC_BOT_TOKEN }}
          TEMPLATE_SYNC_UPSTREAM_READ_TOKEN: ${{ secrets.TEMPLATE_SYNC_UPSTREAM_READ_TOKEN }}
          TEMPLATE_SYNC_DEFAULT_UPSTREAM_REPO: ${{ env.TEMPLATE_SYNC_DEFAULT_UPSTREAM_REPO }}
          TEMPLATE_SYNC_AI_PROVIDER: ${{ env.TEMPLATE_SYNC_AI_PROVIDER }}
          TEMPLATE_SYNC_AI_MODEL: ${{ env.TEMPLATE_SYNC_AI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: handle-template-sync-command
