name: Publish template migration

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number merged into the template default branch
        required: true
        type: number
      generate_summary:
        description: Generate one reusable AI summary for this migration
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

env:
  # Change this to pin a version, git URL, or tarball package spec.
  TEMPLATE_SYNC_PACKAGE: template-subscriber-migration-system@latest
  OPENAI_MODEL: gpt-5.5

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Publish migration bundle release
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEMPLATE_SYNC_GENERATE_SUMMARY: ${{ inputs.generate_summary }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
        run: |
          if [ -z "$TEMPLATE_SYNC_PACKAGE" ]; then
            echo "::error::Set TEMPLATE_SYNC_PACKAGE to a published npm package, git URL, or tarball package spec."
            exit 1
          fi
          npm exec --yes --package "$TEMPLATE_SYNC_PACKAGE" -- publish-template-migration "${{ inputs.pr_number }}"
